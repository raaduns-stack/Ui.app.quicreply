<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sales Pipeline — QuicReply Sales OS</title>
  <meta name="description" content="QuicReply revenue pipeline — track every deal from discovery to close." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="../shell.css" />
  <style>
    /* ══ Form inputs ══ */
    .input-field {
      width: 100%;
      padding: 10px 12px;
      font-size: 13px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      font-family: 'Inter', sans-serif;
    }
    .input-field:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(186, 0, 49, 0.1);
    }

    /* ══ Board shell ══ */
    .kanban-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 24px;
      /* custom thin scrollbar */
      scrollbar-width: thin;
      scrollbar-color: #e2e8f0 transparent;
    }
    .kanban-wrap::-webkit-scrollbar { height: 5px; }
    .kanban-wrap::-webkit-scrollbar-track { background: transparent; }
    .kanban-wrap::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }

    .kanban-board {
      display: flex;
      gap: 14px;
      min-height: calc(100vh - 220px);
      /* a little extra on each side so the board breathes */
      padding: 2px 2px 0;
      width: max-content;
    }

    /* ══ Column ══ */
    .kanban-column {
      width: 272px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      border-radius: 16px;
      padding: 0;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .kanban-column:hover { border-color: #e2e8f0; }

    /* Column header */
    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 14px 10px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    .col-header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    /* colour dot — shows stage progression */
    .col-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .col-title {
      font-size: 12px;
      font-weight: 700;
      color: #374151;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .col-count {
      font-size: 10px;
      font-weight: 700;
      color: #9ca3af;
      background: #f1f5f9;
      border-radius: 99px;
      padding: 2px 8px;
      min-width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    /* Stage value total */
    .col-value {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      padding: 6px 14px 10px;
      border-bottom: 1px solid #f1f5f9;
      flex-shrink: 0;
    }

    /* Card list area */
    .col-cards {
      flex: 1;
      overflow-y: auto;
      padding: 10px 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      scrollbar-width: thin;
      scrollbar-color: #e2e8f0 transparent;
    }
    .col-cards::-webkit-scrollbar { width: 3px; }
    .col-cards::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 99px; }

    /* ══ Deal Card ══ */
    .kanban-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      cursor: grab;
      transition: all 0.18s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      user-select: none;
    }
    .kanban-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
      background: transparent;
      transition: background 0.18s;
    }
    .kanban-card:hover {
      border-color: rgba(186,0,49,0.2);
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      transform: translateY(-2px);
    }
    .kanban-card:hover::before { background: var(--brand); }
    .kanban-card:active {
      cursor: grabbing;
      transform: scale(1.01);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      z-index: 10;
    }

    /* Card internals */
    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 6px;
      margin-bottom: 8px;
    }
    .card-name {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
    }
    .card-revenue {
      font-size: 12px;
      font-weight: 800;
      color: var(--brand);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }
    .card-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 5px;
      white-space: nowrap;
    }
    .card-tag-gray   { background: #f3f4f6; color: #6b7280; border: 1px solid #e5e7eb; }
    .card-tag-green  { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .card-tag-amber  { background: #fffbeb; color: #d97706; border: 1px solid #fde68a; }
    .card-tag-brand  { background: rgba(186,0,49,0.06); color: var(--brand); border: 1px solid rgba(186,0,49,0.15); }
    .card-tag-blue   { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }

    /* Card footer row */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding-top: 8px;
      border-top: 1px solid #f3f4f6;
      margin-top: 2px;
    }
    .card-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .card-date {
      font-size: 10px;
      color: #9ca3af;
      font-weight: 500;
      flex: 1;
    }
    .card-actions {
      display: flex;
      gap: 3px;
    }
    .card-btn {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.12s;
      color: #6b7280;
    }
    .card-btn:hover { background: #fff; border-color: #d1d5db; color: #111827; }
    .card-btn-primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
    }
    .card-btn-primary:hover { background: var(--brand-hover); border-color: var(--brand-hover); }

    /* ══ Empty state ══ */
    .col-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      border: 1.5px dashed #e5e7eb;
      border-radius: 10px;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .col-empty:hover { border-color: #d1d5db; }
    .col-empty-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #d1d5db;
    }
    .col-empty p {
      font-size: 11px;
      color: #d1d5db;
      font-weight: 600;
      text-align: center;
    }

    /* ══ Column add button ══ */
    .col-add {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 14px 12px;
      font-size: 11px;
      font-weight: 600;
      color: #9ca3af;
      cursor: pointer;
      transition: color 0.12s;
      border-top: 1px solid #f1f5f9;
      flex-shrink: 0;
    }
    .col-add:hover { color: var(--brand); }

    /* ══ Progress bar under board ══ */
    .pipeline-progress {
      display: flex;
      gap: 3px;
      margin-top: 16px;
    }
    .pipeline-progress-seg {
      height: 3px;
      border-radius: 99px;
      flex: 1;
      opacity: 0.35;
      transition: opacity 0.2s;
    }
    .pipeline-progress-seg.active { opacity: 1; }

    /* Stats bar */
    .stat-chip {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
    }
    .stat-chip-label {
      font-size: 10px;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stat-chip-val {
      font-size: 14px;
      font-weight: 800;
      color: #111827;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <div id="sidebar-mount"></div>
  <div class="layout-with-sidebar" id="main-layout">
    <div id="topbar-mount" data-title="Pipeline · Revenue Board"></div>

    <main class="flex-1 flex flex-col overflow-hidden" style="padding:24px 28px 0;">

      <!-- ── Page header ── -->
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-5 flex-shrink-0">
        <div>
          <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">Sales Pipeline</h1>
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs font-semibold text-gray-400">Workflow:</span>
            <select class="bg-transparent border-none text-gray-900 font-bold text-xs
                           focus:ring-0 p-0 cursor-pointer hover:text-[#ba0031] transition-colors"
                    id="pipeline-type" onchange="updateBoard()">
              <option value="wig">Wig Vendor Workflow</option>
              <option value="gadget">Gadget Store Workflow</option>
              <option value="custom">Standard SaaS B2B</option>
            </select>
          </div>
        </div>

        <!-- Stats + CTA -->
        <div class="flex items-center gap-5">
          <!-- stat chips -->
          <div class="hidden md:flex items-center gap-5">
            <div class="stat-chip">
              <span class="stat-chip-label">Pipeline</span>
              <span class="stat-chip-val" id="pipeline-value">$24,500</span>
            </div>
            <div class="w-px bg-gray-200" style="height:32px;"></div>
            <div class="stat-chip">
              <span class="stat-chip-label">Deals</span>
              <span class="stat-chip-val" id="pipeline-count">4</span>
            </div>
            <div class="w-px bg-gray-200" style="height:32px;"></div>
            <div class="stat-chip">
              <span class="stat-chip-label">Win rate</span>
              <span class="stat-chip-val">38%</span>
            </div>
          </div>
          <button class="btn-primary text-sm" style="height:38px;"
                  onclick="openAddDealModal()">
            <span class="material-symbols-outlined" style="font-size:18px;">add</span>
            Add Deal
          </button>
        </div>
      </div>

      <!-- ── Kanban board (scrollable) ── -->
      <div class="kanban-wrap">
        <div class="kanban-board" id="kanban-board">
          <!-- Columns injected by JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- ── Add Deal Modal ── -->
  <div id="modal-add-deal" class="modal-backdrop hidden">
    <div class="modal-box w-full max-w-md">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-xl font-bold text-gray-900 tracking-tight">Add New Deal</h2>
        <button class="btn-ghost" style="padding:4px;" data-modal-close="modal-add-deal">
          <span class="material-symbols-outlined" style="font-size:20px;">close</span>
        </button>
      </div>
      
      <div id="deal-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-600 text-xs font-semibold rounded-lg"></div>

      <div class="space-y-4">
        <div>
          <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-1.5">Customer Name <span class="text-red-500">*</span></label>
          <input type="text" id="deal-name" class="input-field" placeholder="e.g., Jane Doe" />
        </div>
        <div>
          <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-1.5">Phone / WhatsApp Number <span class="text-red-500">*</span></label>
          <input type="text" id="deal-phone" class="input-field" placeholder="+1 (555) 000-0000" />
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-1.5">Deal Value <span class="text-red-500">*</span></label>
            <input type="text" id="deal-price" class="input-field" placeholder="$0" />
          </div>
          <div>
            <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-1.5">Priority</label>
            <select id="deal-priority" class="input-field">
              <option value="Normal">Normal</option>
              <option value="Low">Low</option>
              <option value="Priority">Priority</option>
              <option value="Urgent">Urgent</option>
            </select>
          </div>
        </div>
        <div>
          <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-1.5">Pipeline Stage <span class="text-red-500">*</span></label>
          <select id="deal-stage" class="input-field">
            <!-- options injected dynamically -->
          </select>
        </div>
        <div>
          <label class="text-xs font-bold text-gray-600 uppercase tracking-widest block mb-1.5">Notes</label>
          <textarea id="deal-notes" class="input-field h-20 resize-y" placeholder="Optional notes..."></textarea>
        </div>
      </div>

      <div class="flex gap-3 mt-6">
        <button class="btn-secondary flex-1 justify-center" data-modal-close="modal-add-deal">Cancel</button>
        <button class="btn-primary flex-1 justify-center" onclick="saveDeal()">Save Deal</button>
      </div>
    </div>
  </div>

  <script src="../sidebar.js"></script>
  <script src="../shell.js"></script>
  <script>
    /* ─── Stage colour palette (left-to-right progression) ─── */
    const STAGE_COLORS = ['#9ca3af','#6366f1','#f59e0b','#10b981','#ba0031'];

    const configs = {
      wig: {
        stages: [
          { id: 'new',       name: 'New Inquiry',       color: STAGE_COLORS[0] },
          { id: 'style',     name: 'Style Confirmed',   color: STAGE_COLORS[1] },
          { id: 'paid',      name: 'Payment Received',  color: STAGE_COLORS[2] },
          { id: 'shipped',   name: 'Shipped / Closed',  color: STAGE_COLORS[3] },
        ],
        data: [
          { name: 'Alice Wong',    price: '$240',   status: 'Priority', tag: 'amber',  stage: 'new',     avatar: 'AW', date: 'Apr 19', agent: '#6366f1' },
          { name: 'Sarah J.',      price: '$180',   status: 'Waiting',  tag: 'gray',   stage: 'new',     avatar: 'SJ', date: 'Apr 20', agent: '#10b981' },
          { name: 'Kylie M.',      price: '$450',   status: 'Urgent',   tag: 'brand',  stage: 'style',   avatar: 'KM', date: 'Apr 18', agent: '#f59e0b' },
          { name: 'Beyoncé F.',    price: '$1,200', status: 'VIP',      tag: 'green',  stage: 'paid',    avatar: 'BF', date: 'Apr 17', agent: '#ba0031' },
          { name: 'Linda T.',      price: '$310',   status: 'Follow Up',tag: 'blue',   stage: 'new',     avatar: 'LT', date: 'Apr 21', agent: '#6366f1' },
        ]
      },
      gadget: {
        stages: [
          { id: 'inquiry',   name: 'Inquiry',           color: STAGE_COLORS[0] },
          { id: 'spec',      name: 'Spec Confirmed',    color: STAGE_COLORS[1] },
          { id: 'payment',   name: 'Payment Received',  color: STAGE_COLORS[2] },
          { id: 'delivered', name: 'Delivered',         color: STAGE_COLORS[3] },
        ],
        data: [
          { name: 'Tech Store Ltd', price: '$2,400', status: 'Bulk', tag: 'blue',  stage: 'spec',    avatar: 'TS', date: 'Apr 20', agent: '#6366f1' },
          { name: 'Marcus R.',      price: '$890',   status: 'Active', tag: 'green', stage: 'inquiry', avatar: 'MR', date: 'Apr 21', agent: '#10b981' },
          { name: 'Diana P.',       price: '$650',   status: 'Urgent', tag: 'brand', stage: 'payment', avatar: 'DP', date: 'Apr 18', agent: '#ba0031' },
        ]
      },
      custom: {
        stages: [
          { id: 'lead',        name: 'Discovery',       color: STAGE_COLORS[0] },
          { id: 'demo',        name: 'Demo Conducted',  color: STAGE_COLORS[1] },
          { id: 'proposal',    name: 'Proposal Sent',   color: STAGE_COLORS[2] },
          { id: 'negotiation', name: 'Negotiation',     color: STAGE_COLORS[3] },
          { id: 'won',         name: 'Won / Closed',    color: STAGE_COLORS[4] },
        ],
        data: [
          { name: 'Acme Corp',       price: '$5,000',  status: 'Decision Maker', tag: 'blue',  stage: 'demo',        avatar: 'AC', date: 'Apr 19', agent: '#6366f1' },
          { name: 'Bright Labs',     price: '$2,800',  status: 'Warm Lead',      tag: 'amber', stage: 'lead',        avatar: 'BL', date: 'Apr 20', agent: '#f59e0b' },
          { name: 'Orbit Systems',   price: '$8,500',  status: 'VIP',            tag: 'brand', stage: 'proposal',    avatar: 'OS', date: 'Apr 17', agent: '#ba0031' },
          { name: 'NovaBridge',      price: '$3,200',  status: 'Active',         tag: 'green', stage: 'negotiation', avatar: 'NB', date: 'Apr 15', agent: '#10b981' },
        ]
      }
    };

    function makeCard(d) {
      const tagClass = {
        gray: 'card-tag-gray', green: 'card-tag-green',
        amber: 'card-tag-amber', brand: 'card-tag-brand', blue: 'card-tag-blue'
      }[d.tag] || 'card-tag-gray';

      const card = document.createElement('div');
      card.className = 'kanban-card';
      card.draggable = true;
      card.innerHTML = `
        <div class="card-top">
          <span class="card-name">${d.name}</span>
          <span class="card-revenue">${d.price}</span>
        </div>
        <div class="card-tags">
          <span class="card-tag ${tagClass}">${d.status}</span>
        </div>
        <div class="card-footer">
          <div class="card-avatar" style="background:${d.agent};">${d.avatar}</div>
          <span class="card-date">${d.date}</span>
          <div class="card-actions">
            <button class="card-btn" title="View profile"
                    onclick="event.stopPropagation(); QR.showToast('Opening CRM profile…','info')">
              <span class="material-symbols-outlined" style="font-size:14px;">person</span>
            </button>
            <button class="card-btn card-btn-primary" title="Advance stage"
                    onclick="event.stopPropagation(); QR.showToast('Moving to next stage…','success')">
              <span class="material-symbols-outlined" style="font-size:14px;">arrow_forward</span>
            </button>
          </div>
        </div>
      `;
      return card;
    }

    function updateBoard() {
      const type   = document.getElementById('pipeline-type').value;
      const board  = document.getElementById('kanban-board');
      const config = configs[type];

      board.innerHTML = '';

      config.stages.forEach((stage, idx) => {
        const stageCards = config.data.filter(d => d.stage === stage.id);
        const stageTotal = stageCards.reduce((s, d) => s + parseInt(d.price.replace(/[$,]/g, '')), 0);

        const col = document.createElement('div');
        col.className = 'kanban-column';
        col.innerHTML = `
          <div class="col-header">
            <div class="col-header-left">
              <div class="col-dot" style="background:${stage.color};"></div>
              <span class="col-title">${stage.name}</span>
            </div>
            <span class="col-count">${stageCards.length}</span>
          </div>
          ${stageCards.length > 0 ? `<div class="col-value">${stageTotal > 0 ? '$' + stageTotal.toLocaleString() : '—'}</div>` : ''}
          <div class="col-cards" id="col-${stage.id}"></div>
          <div class="col-add" onclick="QR.showToast('Add deal to ${stage.name}','info')">
            <span class="material-symbols-outlined" style="font-size:14px;">add</span> Add deal
          </div>
        `;

        board.appendChild(col);

        const cardSection = col.querySelector(`#col-${stage.id}`);

        if (stageCards.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'col-empty';
          empty.innerHTML = `
            <div class="col-empty-icon">
              <span class="material-symbols-outlined" style="font-size:18px;">inbox</span>
            </div>
            <p>No deals here</p>
          `;
          cardSection.appendChild(empty);
        } else {
          stageCards.forEach(d => cardSection.appendChild(makeCard(d)));
        }
      });

      // Update stats
      const allCards = config.data;
      const totalVal = allCards.reduce((s, d) => s + parseInt(d.price.replace(/[$,]/g, '')), 0);
      document.getElementById('pipeline-value').textContent = '$' + totalVal.toLocaleString();
      document.getElementById('pipeline-count').textContent = allCards.length;
    }

    function openAddDealModal() {
      const type = document.getElementById('pipeline-type').value;
      const stages = configs[type].stages;
      const stageSelect = document.getElementById('deal-stage');
      stageSelect.innerHTML = stages.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
      
      document.getElementById('deal-error').classList.add('hidden');
      
      // Reset fields
      document.getElementById('deal-name').value = '';
      document.getElementById('deal-phone').value = '';
      document.getElementById('deal-price').value = '';
      document.getElementById('deal-notes').value = '';
      document.getElementById('deal-priority').value = 'Normal';
      
      QR.openModal('modal-add-deal');
    }

    function saveDeal() {
      const name = document.getElementById('deal-name').value.trim();
      const phone = document.getElementById('deal-phone').value.trim();
      const priceStr = document.getElementById('deal-price').value.trim();
      const stage = document.getElementById('deal-stage').value;
      const priority = document.getElementById('deal-priority').value;
      
      const errorEl = document.getElementById('deal-error');
      
      if (!name || !phone || !priceStr || !stage) {
        errorEl.textContent = "Please fill in all required fields.";
        errorEl.classList.remove('hidden');
        return;
      }
      
      errorEl.classList.add('hidden');
      
      let price = priceStr;
      if (!price.startsWith('$')) price = '$' + price;
      
      let tag = 'gray';
      if (priority === 'Priority') tag = 'amber';
      else if (priority === 'Urgent') tag = 'brand';
      else if (priority === 'Normal') tag = 'green';
      else if (priority === 'Low') tag = 'blue';
      
      const avatar = name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() || 'NEW';
      const agentColors = ['#6366f1', '#10b981', '#f59e0b', '#ba0031'];
      const randomAgentColor = agentColors[Math.floor(Math.random() * agentColors.length)];
      
      const newDeal = {
        name: name,
        price: price,
        status: priority,
        tag: tag,
        stage: stage,
        avatar: avatar,
        date: new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
        agent: randomAgentColor
      };
      
      const currentType = document.getElementById('pipeline-type').value;
      configs[currentType].data.push(newDeal);
      
      updateBoard();
      
      QR.closeModal('modal-add-deal');
      QR.showToast('Deal added successfully', 'success');
    }

    document.addEventListener('DOMContentLoaded', updateBoard);
  </script>
</body>
</html>
