<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Revenue Engine Primed - QuicReply</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ba0031",
                        "primary-variant": "#e80040",
                        "surface": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "secondary": "#5f5e5e",
                        "outline": "#e1e3e4",
                        "wa-green": "#25D366",
                        "wa-dark": "#128C7E",
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1.25rem",
                        "xl": "2rem",
                        "2xl": "2.5rem",
                        "full": "9999px"
                    },
                    fontFamily: { sans: ["Inter", "sans-serif"] },
                    boxShadow: {
                        "premium": "0 20px 50px -12px rgba(0,0,0,0.08)",
                        "premium-hover": "0 30px 60px -12px rgba(186,0,49,0.12)",
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../../shell.css" />
    <style>
        body {
            min-height: 100vh;
            padding: 0;
            margin: 0;
            background: radial-gradient(circle at top, rgba(186, 0, 49, .08), transparent 28%), var(--surface);
            overflow-x: hidden;
        }

        .main-content {
            min-height: calc(100vh - var(--topbar-height));
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 24px 80px;
        }

        .complete-card {
            max-width: 580px;
            width: 100%;
            background: #fff;
            border-radius: 32px;
            border: 1px solid var(--border);
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(15, 23, 42, .08);
            animation: slideUp .4s ease-out;
        }

        .success-ring {
            width: 88px;
            height: 88px;
            border-radius: 999px;
            background: #fee2e2;
            color: #ba0031;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            position: relative;
        }

        .success-ring::after {
            content: "";
            position: absolute;
            inset: -8px;
            border-radius: 999px;
            border: 2px solid #fee2e2;
            animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite;
        }
    </style>
</head>

<body>

    <div id="topbar-mount" data-title="Onboarding · Primed"></div>

    <div class="main-content">
        <div class="complete-card space-y-8">
            <div class="success-ring"><span class="material-symbols-outlined text-4xl font-bold">verified</span></div>
            <div class="space-y-3">
                <h1 class="text-4xl font-black text-gray-900 tracking-tight">Revenue Engine Primed</h1>
                <p class="text-gray-600 text-lg leading-relaxed">Your Sales Generator is initialized. Jennifer is now
                    training on your business context and ready to close leads.</p>
            </div>

            <div class="grid gap-3 sm:grid-cols-3">
                <div class="p-4 rounded-2xl bg-slate-50 border border-slate-200">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Leads</p>
                    <p class="mt-1 font-bold text-gray-900">Active</p>
                </div>
                <div class="p-4 rounded-2xl bg-slate-50 border border-slate-200">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">AI Rep</p>
                    <p class="mt-1 font-bold text-gray-900">Training</p>
                </div>
                <div class="p-4 rounded-2xl bg-slate-50 border border-slate-200">
                    <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Dashboard</p>
                    <p class="mt-1 font-bold text-gray-900">Unlocked</p>
                </div>
            </div>

            <button onclick="finish()" class="btn-primary w-full py-4 text-lg font-bold justify-center">Enter Dashboard
                <span class="material-symbols-outlined">rocket_launch</span></button>
        </div>
    </div>

    <script src="../../sidebar.js"></script>
    <script src="../../shell.js"></script>
    <script>
        function finish() {
            if (window.QR && window.QR.finishOnboarding) {
                window.QR.finishOnboarding();
            } else {
                localStorage.setItem("qr_onboarding_done", "true");
                location.href = "../index.html";
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const l1 = document.getElementById('hb-line-1');
            const l2 = document.getElementById('hb-line-2');
            const l3 = document.getElementById('hb-line-3');
            if (!menu || !l1 || !l2 || !l3) return;
            const isOpen = !menu.classList.contains('hidden');
            if (isOpen) {
                menu.classList.add('hidden');
                l1.style.transform = ''; l2.style.opacity = '1'; l3.style.transform = '';
            } else {
                menu.classList.remove('hidden');
                l1.style.transform = 'translateY(8px) rotate(45deg)';
                l2.style.opacity = '0';
                l3.style.transform = 'translateY(-8px) rotate(-45deg)';
            }
        }
    </script>



    <div id="footer-mount"></div>
</body>

</html>
